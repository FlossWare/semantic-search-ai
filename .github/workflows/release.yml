name: Auto Release (X.Y Versioning)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  auto-version-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep -oP '__version__ = "\K[^"]+' python/semantic_search_ai/__init__.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Bump minor version (X.Y)
        id: bump_version
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping from $CURRENT to $NEW_VERSION"

      - name: Update version in files
        run: |
          NEW_VERSION="${{ steps.bump_version.outputs.new_version }}"
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" python/semantic_search_ai/__init__.py
          sed -i "s/version=\".*\"/version=\"$NEW_VERSION\"/" python/setup.py
          echo "Updated to version $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add python/semantic_search_ai/__init__.py python/setup.py
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.bump_version.outputs.new_version }} [skip ci]"
          git push

      - name: Create Git tag
        run: |
          git tag -a "v${{ steps.bump_version.outputs.new_version }}" -m "Release v${{ steps.bump_version.outputs.new_version }}"
          git push origin "v${{ steps.bump_version.outputs.new_version }}"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.bump_version.outputs.new_version }}
          release_name: Semantic Search AI v${{ steps.bump_version.outputs.new_version }}
          body: |
            ## Semantic Search AI v${{ steps.bump_version.outputs.new_version }}

            **X.Y Versioning:** Every merge to main is a release candidate.

            ### Installation
            ```bash
            pip install git+https://github.com/FlossWare/semantic-search-ai.git@v${{ steps.bump_version.outputs.new_version }}
            ```
          draft: false
          prerelease: false

      - name: Build Python package
        run: |
          cd python
          pip install build twine
          python -m build
